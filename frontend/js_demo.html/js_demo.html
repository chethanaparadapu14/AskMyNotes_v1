

<!DOCTYPE html>
<html>
<head>
    <title>Event Handler and Event Listener Example</title>
</head>

<body>

    <h1 id="demo">This is some text.</h1>

    <button onclick="changeText()">
        Change Text
    </button>

    <input type="button" value="Say Hello" id="button"/>
    <button id="btn" style="display:inline-block;">
        Click Me
    </button>

    <input type="text" onkeydown="customizeInput()" placeholder="Type here">

    <script>

    
        function changeText() {

            let element = document.getElementById("demo");

            element.textContent = "Text changed by JavaScript! 2nd time";
        }

        const button = document.querySelector('#button');

        button.addEventListener("click", function(event) {

            const x = event.clientX;
            const y = event.clientY;

          
            alert(`Button clicked at X: ${x}, Y: ${y}`);

        });

       
        const button1 = document.getElementById("btn");

        button1.addEventListener("click", function () {

            console.log("First");

        });

        button1.addEventListener("click", function () {

            console.log("Second");

        });

    
        function customizeInput() {

            var ele = document.getElementsByTagName("INPUT")[1];

            ele.style.backgroundColor = "yellow";
            ele.style.color = "red";

        }

    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>AskMyNotes</title>

    <!-- Tailwind CSS -->

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-br from-slate-100 via-blue-50 to-slate-200 min-h-screen flex flex-col items-center py-12 px-4">


    <!-- Main Container -->

    <div class="w-full max-w-3xl bg-white/80 backdrop-blur-lg p-10 rounded-3xl shadow-2xl border border-white/40">


        <!-- Header -->

        <header class="text-center mb-10">

            <h1 class="text-5xl font-black text-slate-900 mb-3 tracking-tight">

                AskMyNotes

            </h1>

            <p class="text-slate-600 text-lg">

                Upload a PDF. Ask questions. Get AI-powered grounded answers.

            </p>

        </header>



        <!-- Main -->

        <main class="flex flex-col gap-10">


            <!-- Upload Section -->

            <section class="bg-white rounded-2xl border border-slate-200 shadow-md p-6 hover:shadow-xl transition duration-300">

                <h2 class="text-2xl font-bold text-slate-800 mb-5">

                    Upload Notes

                </h2>

                <label
                    for="pdf-input"
                    class="block text-sm font-semibold text-slate-700 mb-3"
                >
                    Upload your notes (PDF)
                </label>

                <input
                    type="file"
                    id="pdf-input"
                    accept=".pdf"

                    class="block w-full text-sm text-slate-500
                    file:mr-4
                    file:py-3
                    file:px-5
                    file:rounded-full
                    file:border-0
                    file:text-sm
                    file:font-semibold
                    file:bg-blue-600
                    file:text-white
                    hover:file:bg-blue-700
                    cursor-pointer
                    transition"
                >

                <div
                    id="upload-status"
                    class="mt-4 text-sm text-slate-500"
                >
                    No file uploaded yet.
                </div>

            </section>



            <!-- Question Section -->

            <section class="bg-white rounded-2xl border border-slate-200 shadow-md p-6 hover:shadow-xl transition duration-300">

                <h2 class="text-2xl font-bold text-slate-800 mb-5">

                    Ask a Question

                </h2>

                <label
                    for="question"
                    class="block text-sm font-semibold text-slate-700 mb-3"
                >
                    Your question
                </label>

                <textarea
                    id="question"
                    rows="4"

                    placeholder="What do my notes say about..."

                    class="block w-full p-4 border border-slate-300 rounded-2xl bg-slate-50
                    focus:ring-4 focus:ring-blue-200
                    focus:border-blue-500
                    outline-none
                    transition
                    resize-none"
                ></textarea>


                <div class="flex items-center justify-between mt-5">

                    <div
                        id="status"
                        class="text-sm text-slate-500"
                    ></div>

                    <button
                        id="ask-btn"

                        class="bg-gradient-to-r from-blue-600 to-indigo-600
                        text-white
                        py-3
                        px-8
                        rounded-xl
                        font-semibold
                        shadow-lg
                        hover:shadow-2xl
                        hover:scale-105
                        hover:from-blue-700
                        hover:to-indigo-700
                        transition
                        duration-300"
                    >

                        Submit

                    </button>

                </div>

            </section>



            <!-- Answer Section -->

            <section class="bg-white rounded-2xl border border-slate-200 shadow-md p-6 hover:shadow-xl transition duration-300">

                <h2 class="text-2xl font-bold text-slate-800 mb-5">

                    Answer

                </h2>



                <!-- Pills -->

                <div id="meta" class="flex gap-3 mb-5">

                    <span
                        id="type-pill"

                        class="hidden px-4 py-1 rounded-full text-xs font-semibold
                        bg-green-100 text-green-700"
                    ></span>


                    <span
                        id="tool-pill"

                        class="hidden px-4 py-1 rounded-full text-xs font-semibold
                        bg-blue-100 text-blue-700"
                    ></span>

                </div>



                <!-- Answer Box -->

                <div
                    id="answer"

                    class="p-5 bg-gradient-to-r from-slate-50 to-blue-50
                    border border-slate-200
                    rounded-2xl
                    min-h-[120px]
                    text-slate-700
                    leading-7"
                >

                    <div id="answer-text">

                        Your answer will appear here...

                    </div>

                </div>



                <!-- Sources -->

                <details
                    id="sources-wrap"

                    class="hidden mt-6 border border-slate-200 rounded-2xl p-5 bg-slate-50"
                >

                    <summary class="cursor-pointer font-semibold text-slate-700">

                        Sources (top chunks used)

                    </summary>

                    <ol
                        id="sources"

                        class="list-decimal pl-6 mt-4 space-y-2 text-slate-600"
                    ></ol>

                </details>

            </section>

        </main>

    </div>



    <!-- Footer -->

    <footer class="mt-8 text-slate-500 text-sm">

        Built as part of the AI Engineering Bootcamp

    </footer>

</body>

</html>
